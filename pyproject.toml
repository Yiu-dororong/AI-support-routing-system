[tool.ruff]
line-length = 88
target-version = "py310"
extend-exclude = ["llama_bin", "llm", "reranker", "embeddings"]

[tool.ruff.lint]
select = ["E", "F", "I", "W", "UP"]          
ignore = []

[tool.ruff.lint.isort]
combine-as-imports = true
lines-after-imports = 2

[tool.ruff.format]                           
quote-style = "double"
indent-style = "space"

[tool.pytest.ini_options]                     
testpaths = ["tests"]
pythonpath = ["."]
asyncio_mode = "auto"
addopts = "--cov=. --cov-report=term-missing"
